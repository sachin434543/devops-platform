
apiVersion: apps/v1
kind: Deployment

metadata:
  name: devops-platform

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devops-platform

  template:
    metadata:
      labels:
        app: devops-platform

    spec:
      containers:
      - name: devops-platform
        image: sachinjaat4345/devops-platform:v1

        ports:
        - containerPort: 3000
